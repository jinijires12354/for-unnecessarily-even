name: backburn
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 97 }
          - { version: 9695 }
          - { version: 1265 }
          - { version: 7498 }
          - { version: 6086 }
          - { version: 9540 }
          - { version: 6524 }
          - { version: 3423 }
          - { version: 6333 }
          - { version: 8024 }
          - { version: 846 }
          - { version: 6445 }
          - { version: 6266 }
          - { version: 4943 }
          - { version: 9702 }
          - { version: 8591 }
